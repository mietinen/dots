# ------------------------------------------------------------------------------
# Monitors
# See https://wiki.hyprland.org/Configuring/Monitors/
# ------------------------------------------------------------------------------
monitor=,preferred,auto,1


# ------------------------------------------------------------------------------
# Autostart
# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
# ------------------------------------------------------------------------------

exec-once = runonce -k /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = runonce -k waybar
exec-once = runonce -k hyprpaper
exec-once = runonce -k hypridle
exec-once = runonce -k mako
exec-once = runonce mpd
exec-once = runonce syncthing --no-browser
exec-once = runonce gioautomount
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Gruvbox-Material-Dark
exec-once = gsettings set org.gnome.desktop.interface icon-theme Gruvbox-Material-Dark
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface font-name "Sans 10"


# ------------------------------------------------------------------------------
# Environment variables
# See https://wiki.hyprland.org/Configuring/Environment-variables/
# ------------------------------------------------------------------------------

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


# ------------------------------------------------------------------------------
# Look and feel
# Refer to https://wiki.hyprland.org/Configuring/Variables/
# ------------------------------------------------------------------------------

# Styling
$fontSize = 14
$fontColor = rgb(fbf1c7)
$barActive = rgba(427b58f0)
$barInactive = rgba(282828cc)
$borderActive = rgba(fe8019ee) rgba(d3869bee) 45deg
$borderInactive = rgba(928374aa)

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    border_size = 1
    gaps_in = 1
    gaps_out = 1

    col.active_border = $borderActive
    col.inactive_border = $borderInactive

    resize_on_border = false
    allow_tearing = false

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 3

    active_opacity = 1.0
    inactive_opacity = 0.9

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled = false
        range = 4
        render_power = 3
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = global, 1, 3, myBezier
    animation = workspaces, 1, 1, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = slave
}

# See https://wiki.hyprland.org/Configuring/Scrolling-Layout/ for more
scrolling {
    column_width = 0.9
    focus_fit_method = 0
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    enable_anr_dialog = false
}


# ------------------------------------------------------------------------------
# Input
# ------------------------------------------------------------------------------

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = no
    kb_variant =
    kb_model =
    kb_options = nbsp:none
    kb_rules =

    follow_mouse = 0
    float_switch_override_focus = 0

    sensitivity = 0
    scroll_factor = 0.5

    touchpad {
        natural_scroll = false
        scroll_factor = 0.5
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = tpps/2-elan-trackpoint
    sensitivity = -0.5
}

# https://wiki.hyprland.org/Configuring/Variables/#debug
debug {
    # disable_logs = false
}

# https://wiki.hypr.land/Configuring/Variables/#ecosystem
ecosystem {
    no_update_news = true
    no_donation_nag = true
}

# ------------------------------------------------------------------------------
# Keybindings
# ------------------------------------------------------------------------------

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER
$left = H
$down = J
$up = K
$right = L

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, sensible-terminal
bind = $mainMod SHIFT, Return, togglespecialworkspace, terminal
bind = $mainMod, W, exec, sensible-browser
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, xdg-open ~
bind = $mainMod, F, fullscreen
bind = $mainMod, Space, layoutmsg, swapwithmaster master
bind = $mainMod, Space, layoutmsg, promote
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod CTRL, Space, layoutmsg, mfact exact 0.55
bind = $mainMod CTRL, Space, layoutmsg, colresize 0.9
bind = $mainMod SHIFT, W, exec, sethyprpaper
bind = $mainMod, B, exec, killall -SIGUSR1 waybar
bind = $mainMod, C, exec, wl-copy -c; wl-copy -pc; notify-send "Clipboard" "Cleared all clipboard selections"

# rofi
bind = $mainMod, D, exec, rofi -show drun -show-icons
bind = $mainMod, R, exec, rofi -show run
bind = $mainMod, N, exec, networkmanager_dmenu
bind = $mainMod, A, exec, rofi -show sink
bind = $mainMod, S, exec, rofi -show smb
bind = $mainMod, X, exec, rofi -show emoji
bind = $mainMod SHIFT, M, exec, rofi -show man
bind = $mainMod, Delete, exec, rofi -show exit

# XF86
bindl = , XF86AudioRaiseVolume, exec, volumectl up
bindl = , XF86AudioLowerVolume, exec, volumectl down
bindl = , XF86AudioMute, exec, volumectl toggle
bindl = , XF86AudioMicMute, exec, volumectl togglemic
bindl = , XF86AudioPlay, exec, rmpc togglepause
bindl = , XF86AudioStop, exec, rmpc stop
bindl = , XF86AudioPrev, exec, rmpc prev
bindl = , XF86AudioNext, exec, rmpc next
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , Print, exec, grimcopy
bind = , XF86Launch2, exec, grimcopy select

# MPD
bind = $mainMod, M, submap, mpd
submap = mpd
bind = , J, exec, rmpc prev
bind = , K, exec, rmpc togglepause
bind = , L, exec, rmpc next
bind = , catchall, submap, reset
submap = reset

# Move focus to next window with mainMod + TAB
bind = $mainMod, TAB, cyclenext
bind = $mainMod SHIFT, TAB, cyclenext, prev
bind = $mainMod, TAB, alterzorder, top
bind = $mainMod SHIFT, TAB, alterzorder, top
# Move focus with mainMod + VIM/arrow
bind = $mainMod, $left, movefocus, l
bind = $mainMod, $right, movefocus, r
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $down, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Move focused window with mainMod+SHIFT + VIM/arrow
bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $right, movewindow, r
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $down, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
# Resize focused window with mainMod+CTRL + VIM/arrow
bind = $mainMod CTRL, $left, resizeactive, -5% 0
bind = $mainMod CTRL, $right, resizeactive, 5% 0
bind = $mainMod CTRL, $up, resizeactive, 0 -5%
bind = $mainMod CTRL, $down, resizeactive, 0 5%
bind = $mainMod CTRL, left, resizeactive, -5% 0
bind = $mainMod CTRL, right, resizeactive, 5% 0
bind = $mainMod CTRL, up, resizeactive, 0 -5%
bind = $mainMod CTRL, down, resizeactive, 0 5%

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move active window to a workspace with mainMod+SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ------------------------------------------------------------------------------
# Windows and workspaces
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# ------------------------------------------------------------------------------

windowrule = suppress_event maximize, match:class .* # You'll probably like this.
windowrule = center on, match:float true # center floating windows

# Floating
windowrule = float on, match:class qalculate-gtk
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class .*\.pavucontrol
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class wev

# Organizing
windowrule = workspace 4, match:class discord
windowrule = workspace 4, match:class (?i:signal)
windowrule = workspace 4, match:class telegram-desktop
windowrule = workspace 4, match:class element
windowrule = workspace 5, match:class (?i:spotify)
windowrule = workspace 5, match:class plexmediaplayer
windowrule = workspace 5, match:class mpv
windowrule = workspace 5, match:class (?i:kodi)
windowrule = workspace 5, match:class (?i:freetube)
windowrule = workspace 7, match:class virt-manager
windowrule = workspace 7, match:class virt-viewer
windowrule = workspace 7, match:class (?i:virtualbox)
windowrule = workspace 8, match:class (?i:steam)
windowrule = workspace 8, match:class (?i:lutris)
windowrule = workspace 9, match:class steam_app_.*
windowrule = workspace 9, match:class steam_proton
windowrule = workspace 9, match:class gamescope
windowrule = workspace 9, match:class (?i:com.libretro.retroarch)

# ------------------------------------------------------------------------------
# Workspaces
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules
# ------------------------------------------------------------------------------

workspace = 4, layout:scrolling
workspace = special:terminal, on-created-empty:[float]sensible-terminal
